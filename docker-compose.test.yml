# Quick HTTP test on a SHARED VM (no HTTPS, no reverse proxy).
# Publishes the web app on a host port for direct IP access, WITHOUT touching ports
# 80/443 — so it won't disturb Traefik / your other sites. Temporary validation only;
# the admin password and uploads travel unencrypted over plain HTTP.
#
#   docker compose -f docker-compose.yml -f docker-compose.test.yml up -d --build
#   open  http://<server-ip>:8080      (open that port in the firewall first)
#
# Override TEST_PORT if 8080 is already in use:  TEST_PORT=8090 docker compose ... up -d
services:
  web:
    ports:
      - "${TEST_PORT:-8080}:8000"   # external :8080 -> app :8000 (adds to the localhost bind)
