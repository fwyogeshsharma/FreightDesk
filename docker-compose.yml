# Local dev now, VM deployment later: same file.
#   docker compose up -d db                                  # just Postgres
#   docker compose up -d                                     # Postgres + broker web app
#   VIDEOS_DIR=/data/footage docker compose --profile pipeline run --rm pipeline
#                                                            # process videos into the DB
#
# Videos are operational INPUT DATA (large), so they are never baked into the image —
# they are mounted at runtime from the host via VIDEOS_DIR (default ./videos).

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-trucks}
    ports:
      # Host access only (the web container reaches Postgres internally at db:5432
      # regardless). On a shared host set DB_BIND to a free port, e.g. 127.0.0.1:55432.
      - "${DB_BIND:-127.0.0.1:5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-trucks}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Inside the compose network the database host is the service name "db".
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-trucks}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      # Async mobile-report photo storage (see DEPLOY.md). Default "local"; set to "gcs"
      # in .env for prod. GOOGLE_APPLICATION_CREDENTIALS points at a mounted key file
      # when the VM's own service account can't be used (see docker-compose.override.yml).
      IMAGE_STORAGE_BACKEND: ${IMAGE_STORAGE_BACKEND:-local}
      IMAGE_STORAGE_DIR: ${IMAGE_STORAGE_DIR:-/app/uploads}
      IMAGE_RETENTION_DAYS: ${IMAGE_RETENTION_DAYS:-2}
      GCS_BUCKET: ${GCS_BUCKET:-}
      GCS_PREFIX: ${GCS_PREFIX:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
    ports:
      # Default: localhost only. For a direct-IP quick test set WEB_BIND=0.0.0.0:<freeport>;
      # behind a reverse proxy (Caddy/Traefik/nginx) leave default or use a free localhost port.
      - "${WEB_BIND:-127.0.0.1:8000}:8000"

  # Extraction pipeline — run on demand, NOT part of `up` (hence the profile).
  # Mounts the host's video folder read-only so the container can find the footage.
  #   VIDEOS_DIR=/path/to/footage docker compose --profile pipeline run --rm pipeline
  # Add args after the service name, e.g. `... run --rm pipeline --workers 2 --sink both`.
  pipeline:
    build: .
    profiles: ["pipeline"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-trucks}
    volumes:
      - ${VIDEOS_DIR:-./videos}:/app/videos:ro   # host footage → container (read-only)
      - ./output:/app/output                     # CSV backup when --sink both/csv
    entrypoint: ["python", "main.py"]
    command: ["--input", "/app/videos", "--sink", "db"]

volumes:
  pgdata:
