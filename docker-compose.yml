# Local dev now, VM deployment later: same file.
#   docker compose up -d db                                  # just Postgres
#   docker compose up -d                                     # Postgres + broker web app
#   VIDEOS_DIR=/data/footage docker compose --profile pipeline run --rm pipeline
#                                                            # process videos into the DB
#
# Videos are operational INPUT DATA (large), so they are never baked into the image —
# they are mounted at runtime from the host via VIDEOS_DIR (default ./videos).

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-trucks}
    ports:
      - "127.0.0.1:5432:5432"   # localhost only — never expose Postgres publicly
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-trucks}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Inside the compose network the database host is the service name "db".
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-trucks}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
    ports:
      - "127.0.0.1:8000:8000"   # localhost only; in prod Caddy fronts it on 443
    # The app reads only the database — no shared files needed (photos aren't stored).

  # Extraction pipeline — run on demand, NOT part of `up` (hence the profile).
  # Mounts the host's video folder read-only so the container can find the footage.
  #   VIDEOS_DIR=/path/to/footage docker compose --profile pipeline run --rm pipeline
  # Add args after the service name, e.g. `... run --rm pipeline --workers 2 --sink both`.
  pipeline:
    build: .
    profiles: ["pipeline"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-trucks}
    volumes:
      - ${VIDEOS_DIR:-./videos}:/app/videos:ro   # host footage → container (read-only)
      - ./output:/app/output                     # CSV backup when --sink both/csv
    entrypoint: ["python", "main.py"]
    command: ["--input", "/app/videos", "--sink", "db"]

volumes:
  pgdata:
