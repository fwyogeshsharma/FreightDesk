<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Telecaller Login — FreightDesk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      fontFamily: { sans: ['"IBM Plex Sans"','ui-sans-serif','system-ui','sans-serif'] },
      colors: { ink: '#0a0e14' } }}}
  </script>
</head>
<body class="font-sans text-slate-100 antialiased min-h-screen grid place-items-center bg-ink relative overflow-hidden">
  <div class="absolute inset-0 opacity-[0.15]"
       style="background-image: radial-gradient(circle at 1px 1px, #fff 1px, transparent 0); background-size: 22px 22px;"></div>
  <div class="absolute -top-24 -left-24 w-96 h-96 rounded-full bg-amber-500/20 blur-3xl"></div>

  <form method="post" action="/review/login"
        class="relative bg-white/5 backdrop-blur border border-white/10 rounded-2xl p-8 w-full max-w-sm flex flex-col gap-5 shadow-2xl">
    <div class="flex items-center gap-3">
      <span class="grid place-items-center w-10 h-10 rounded-md bg-amber-500 text-ink">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </span>
      <div class="leading-tight">
        <div class="font-bold text-lg">Telecaller Login</div>
        <div class="text-[11px] uppercase tracking-[0.18em] text-slate-400">FreightDesk · Review Queue access</div>
      </div>
    </div>

    <p class="text-sm text-slate-400 -mt-1">For telecallers &amp; admins. Brokers don't need an account — the truck list is open. New operator accounts are created by an admin.</p>

    {% if error %}
      <div class="text-sm text-red-300 bg-red-500/10 border border-red-500/20 rounded-md px-3 py-2">Incorrect phone or password, or this account isn't a telecaller.</div>
    {% endif %}

    <label class="text-xs uppercase tracking-wider text-slate-400 -mb-3">Phone</label>
    <input type="text" name="phone" autofocus required placeholder="9811008120" autocomplete="username"
           class="px-3 py-2.5 rounded-md bg-white/10 border border-white/15 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-amber-400">

    <label class="text-xs uppercase tracking-wider text-slate-400 -mb-3">Password</label>
    <input type="password" name="password" required placeholder="••••••••" autocomplete="current-password"
           class="px-3 py-2.5 rounded-md bg-white/10 border border-white/15 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-amber-400">
    <button class="bg-amber-500 hover:bg-amber-400 text-ink font-semibold px-3 py-2.5 rounded-md transition-colors">Sign in</button>
    <a href="/" class="text-xs text-slate-400 text-center hover:text-slate-200 transition-colors">← back to truck list</a>
  </form>
</body>
</html>
